<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lacrosse Scoreboard - コントロールパネル</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* 操作画面専用のモダンなダークUIデザイン */
    body.control-page {
      background: linear-gradient(135deg, #111424 0%, #0c0e1a 100%);
      color: #e0e6ed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    h1.panel-title {
      font-size: 20px;
      margin: 5px 0 15px 0;
      color: #00b4d8;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 180, 216, 0.3);
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* 各操作ブロックのカード化 */
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(4px);
    }

    .card-title {
      font-size: 13px;
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-left: 3px solid #00b4d8;
      padding-left: 8px;
    }

    /* チーム操作エリアのグリッド */
    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .team-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      padding: 12px 8px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* 筑波側と相手側で色分け */
    .team-box.home {
      border-bottom: 3px solid #4f46e5; /* 筑波側のアクセント */
    }
    .team-box.away {
      border-bottom: 3px solid #ec4899; /* アウェイ側のアクセント */
    }

    .team-label {
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #94a3b8;
    }

    /* 入力フォームのスタイリッシュ化 */
    .input-field {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      padding: 8px 10px;
      font-size: 14px;
      text-align: center;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: #00b4d8;
      box-shadow: 0 0 8px rgba(0, 180, 216, 0.3);
    }

    /* 得点表示 */
    .score-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      width: 100%;
    }

    .score-num {
      font-size: 38px;
      font-weight: 800;
      color: #ffffff;
      min-width: 45px;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
    }

    /* スコア加減ボタン：直感的に押しやすく巨大化 */
    .score-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      color: #fff;
    }

    .score-btn[data-action="add"] {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }
    .score-btn[data-action="add"]:active {
      transform: scale(0.92);
      background: #047857;
    }

    .score-btn[data-action="sub"] {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .score-btn[data-action="sub"]:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.05);
    }

    /* クォーター選択ボタンの横並び */
    .quarter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .quarter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #94a3b8;
      padding: 12px 0;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* 選択中のクォーターは光るように強調 */
    .quarter-btn.active {
      background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
      color: #ffffff;
      border-color: #00b4d8;
      box-shadow: 0 0 12px rgba(0, 180, 216, 0.4);
    }

    /* ロゴ画像アップロードボタン */
    .upload-box {
      width: 100%;
      position: relative;
    }

    .file-input-wrapper {
      position: relative;
      width: 100%;
      height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-input-wrapper:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #00b4d8;
    }

    .file-input-wrapper span {
      font-size: 12px;
      color: #cbd5e1;
    }

    #awayLogoFile {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    /* リセットボタン：誤爆防止に一番下に小さく赤色で配置 */
    .reset-box {
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #ef4444;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 200px;
    }

    .btn-reset:active {
      background: rgba(239, 68, 68, 0.1);
    }
  </style>
</head>

<body class="control-page">

  <h1 class="panel-title">Lax Scoreboard</h1>

  <div class="container">

    <div class="card">
      <div class="card-title">SCORE CONTROLLER</div>
      <div class="teams-grid">
        
        <div class="team-box home">
          <div class="team-label">HOME</div>
          <input type="text" class="input-field" id="homeName" value="筑波" readonly>
          <div class="score-control">
            <button class="score-btn" data-team="home" data-action="sub">-</button>
            <div class="score-num" id="homeScoreDisplay">0</div>
            <button class="score-btn" data-team="home" data-action="add">+</button>
          </div>
        </div>

        <div class="team-box away">
          <div class="team-label">AWAY</div>
          <input type="text" class="input-field" id="awayName" placeholder="アウェイ校名">
          <div class="score-control">
            <button class="score-btn" data-team="away" data-action="sub">-</button>
            <div class="score-num" id="awayScoreDisplay">0</div>
            <button class="score-btn" data-team="away" data-action="add">+</button>
          </div>
        </div>

      </div>
    </div>

    <div class="card">
      <div class="card-title">PERIOD / QUARTER</div>
      <div class="quarter-grid">
        <button class="quarter-btn" data-quarter="Q1">Q1</button>
        <button class="quarter-btn" data-quarter="Q2">Q2</button>
        <button class="quarter-btn" data-quarter="Q3">Q3</button>
        <button class="quarter-btn" data-quarter="Q4">Q4</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">AWAY TEAM LOGO</div>
      <div class="upload-box">
        <div class="file-input-wrapper">
          <span>📁 アウェイ校のロゴ画像を選択</span>
          <input type="file" id="awayLogoFile" accept="image/*">
        </div>
      </div>
    </div>

    <div class="reset-box">
      <button class="btn-reset" id="resetButton">RESET SCOREBOARD</button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/script.js"></script>
</body>
</html>
